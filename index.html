<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fauna+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header id="header">
        <h2 id="textNaglowek">Sebastian Bednarz - DZIKU</h2>
        <nav id="nav">
            <button id="zmianaTrybu">Dark Mode</button>
            <ul id="listaNav">
                <li><a href="" id="menuLista">Home</a></li>
                <li><a href="" id="menuLista">About Me</a></li>
                <li><a href="" id="menuLista">My Path</a></li>
            </ul>
        </nav>
    </header>
    <div class="contenerWelcome">
        <section id="textWelcome">
            <h1>Welcome, to my first portfolio!</h1>
            <h2>My name is Sebastian, and im learning to be a FrontEnd Developer.</h2>
        </section>
        <img src="zdjecieMnie0.png" alt="Me :)">
    </div>
    <script>
        let btnTryb = document.getElementById('zmianaTrybu');
        let header = document.getElementById('header');
        //const menuLista = document.querySelectorAll('nav ul li a');

        btnTryb.addEventListener("click", function(){
            if(btnTryb.classList.contains('btnDark')){
                btnTryb.classList.remove('btnDark');
                document.body.classList.remove('dark');
                header.classList.remove('dark');
                //menuLista.forEach(link=>{
                //    link.style.color = "black";
                //});
            } else {
                btnTryb.classList.add('btnDark');
                document.body.classList.add('dark');
                header.classList.add('dark');
                //menuLista.classList.add('dark');
                //menuLista.forEach(link=>{
                //    link.style.color = "white";
                //});
            }
            
        });
    </script>
</body>
